server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: taskflow-api

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  jackson:
    mapper:
      accept-case-insensitive-enums: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: 120
    refresh-token-expiration-days: 30

  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  file-storage-path: uploads

google:
  oauth:
    client-id: replace-with-google-client-id.apps.googleusercontent.com

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.boot.context.config: DEBUG
    com.zaxxer.hikari: DEBUG